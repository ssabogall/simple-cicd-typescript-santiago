<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
</head>
<body>
  <!-- SUM SECTION -->
  <h1>Sum Two Numbers =)</h1>
  <input type="number" id="sumNum1" placeholder="First number" />
  <span> + </span>
  <input type="number" id="sumNum2" placeholder="Second number" />
  <button type="button" id="btnSum">Sum</button>
  <p>Result: <strong id="sumResult">—</strong></p>

  <!-- SUBTRACT SECTION -->
  <h1>Subtract Two Numbers =)</h1>
  <input type="number" id="subNum1" placeholder="First number" />
  <span> - </span>
  <input type="number" id="subNum2" placeholder="Second number" />
  <button type="button" id="btnSubtract">Subtract</button>
  <p>Result: <strong id="subResult">—</strong></p>

  <!-- MULTIPLY SECTION -->
  <h1>Multiply Two Numbers =)</h1>
  <input type="number" id="mulNum1" placeholder="First number" />
  <span> * </span>
  <input type="number" id="mulNum2" placeholder="Second number" />
  <button type="button" id="btnMultiply">Multiply</button>
  <p>Result: <strong id="mulResult">—</strong></p>

  <!-- DIVIDE SECTION -->
  <h1>Divide Two Numbers =)</h1>
  <input type="number" id="divNum1" placeholder="First number" />
  <span> / </span>
  <input type="number" id="divNum2" placeholder="Second number" />
  <button type="button" id="btnDivide">Divide</button>
  <p>Result: <strong id="divResult">—</strong></p>

  <!-- Load compiled scripts -->
  <script src="sum.js"></script>
  <script src="subtract.js"></script>
  <script src="multiplay.js"></script>
  <script src="divide.js"></script>

  <script>
    // SUM
    document.getElementById('btnSum').addEventListener('click', function () {
      var a = Number(document.getElementById('sumNum1').value) || 0;
      var b = Number(document.getElementById('sumNum2').value) || 0;
      document.getElementById('sumResult').textContent = sum(a, b);
    });

    // SUBTRACT
    document.getElementById('btnSubtract').addEventListener('click', function () {
      var a = Number(document.getElementById('subNum1').value) || 0;
      var b = Number(document.getElementById('subNum2').value) || 0;
      document.getElementById('subResult').textContent = subtract(a, b);
    });

    // MULTIPLY
    document.getElementById('btnMultiply').addEventListener('click', function () {
      var a = Number(document.getElementById('mulNum1').value) || 0;
      var b = Number(document.getElementById('mulNum2').value) || 0;
      document.getElementById('mulResult').textContent = multiplay(a, b);
    });

    // DIVIDE
    document.getElementById('btnDivide').addEventListener('click', function () {
      try {
        var a = Number(document.getElementById('divNum1').value) || 0;
        var b = Number(document.getElementById('divNum2').value) || 0;
        document.getElementById('divResult').textContent = divide(a, b);
      } catch (error) {
        document.getElementById('divResult').textContent = error.message;
      }
    });
  </script>
</body>
</html>
